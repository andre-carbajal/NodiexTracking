name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nodiex-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL || secrets.DATABASE_URL }}

jobs:
  deploy:
    name: Migrate and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Pull Vercel production settings
        run: npx vercel@54.4.1 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        run: npx vercel@54.4.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Capture current production deployment
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          json="$(npx vercel@54.4.1 list nodiex-tracking --status READY --environment production --format json --token="${{ secrets.VERCEL_TOKEN }}")"
          url="$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data.deployments?.[0]?.url ?? "")' "$json")"
          if [ -z "$url" ]; then
            echo "No previous production deployment was found."
          else
            echo "url=$url" >> "$GITHUB_OUTPUT"
            echo "Previous production deployment captured."
          fi

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Deploy prebuilt output
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          output="$(npx vercel@54.4.1 deploy --prebuilt --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "$output"
          url="$(printf '%s\n' "$output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
          if [ -z "$url" ]; then
            echo "Could not determine deployment URL from Vercel output." >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test production
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --max-time 20 https://nodiex-tracking.vercel.app/api/public?lang=es)"
          node -e '
            const data = JSON.parse(process.argv[1]);
            if (!Array.isArray(data.products) || data.products.length < 1) {
              throw new Error("Expected at least one public product");
            }
            if (!Array.isArray(data.certificates) || data.certificates.length < 1) {
              throw new Error("Expected at least one public certificate");
            }
          ' "$response"

      - name: Roll back Vercel on failure
        if: failure() && steps.previous.outputs.url != '' && (steps.deploy.conclusion == 'failure' || steps.smoke.conclusion == 'failure')
        shell: bash
        run: |
          set -euo pipefail
          echo "Deployment failed after capturing previous production. Rolling back Vercel alias."
          npx vercel@54.4.1 rollback "${{ steps.previous.outputs.url }}" --yes --timeout 5m --token="${{ secrets.VERCEL_TOKEN }}"
          echo "Vercel rollback requested. Database migrations are not automatically rolled back; use an explicit rollback migration when needed."
